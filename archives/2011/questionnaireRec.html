<script type="text/javascript">
function show_alert()
{
alert("Hello! I am an alert box!");
}

function show_confirm()
{
var r=confirm("Press a button!");
if (r==true)
  {
  alert("You pressed OK!");
  }
else
  {
  alert("You pressed Cancel!");
  }
}

function show_prompt()
{
var fname=prompt("Please enter your name:","Your name")
document.getElementById("msg").innerHTML="Greetings " + fname
}
</script>

<h2> Your questionnaire has been submitted! </h2>
<p> Thank you! </p>

<script type="text/javascript">
var d = new Date();
theDay=d.getDay();
switch (theDay){
case 5:
  document.write("<p<br /><b>Finally Friday</b><br /><br />");
  break;
case 6:
  document.write("<p><br /<b>Super Saturday</b><br /><br />");
  break;
case 0:
  document.write("<p><br /><b>Sleepy Sunday</b><br /><br />");
  break;
default:
  document.write("<p><br /><b>I'm really looking forward to this weekend!</b><br />");
}
var d = new Date();
var time = d.getHours();
if (time < 12){
  document.write("<b>Good Morning!</b></p>");
} else if (time < 18){
  document.write("<b>Good Afternoon!</b></p>");
} else {
  document.write("<b>Good Evening!</b></p>");
}
</script>
