<html>
<head> 
<title>Artemis Madlib</title>
<SCRIPT LANGUAGE="JavaScript">
<!-- Hide this script from older browsers

	function WriteStory(story) {
		document.write("<font size=5>The word is: </font><br>"+story.word.value);
	
	}
  //End of the script hiding -->
</SCRIPT>
</head>
<body>

	<form>
	<table>
		<tr><td>Give me a word: </td><td><input type="text" name="word" value=""></td</tr>
</table>
		<input type="hidden" NAME="results">
		<input type="button" VALUE="Write my word!" onClick="WriteStory(this.form)">
		<input type="reset">

	</form>


</body>

</html>
