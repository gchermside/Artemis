<HTML>
<HEAD>
<TITLE>Liz's Background Changer</TITLE>
<P><SCRIPT language="javascript">
function changecolor(color) {
	document.bgColor=color;
}
 </SCRIPT>
</HEAD>
<BODY> 
<CENTER>
<H1>
Click to change the background color!!!!!
</H1>
<form>
<input type="button" name="Button1" value="Pink" onclick="changecolor('pink')">
<input type="button" name="Button1" value="Yellow" onclick="changecolor('yellow')">
<input type="button" name="Button1" value="Purple" onclick="changecolor('purple')">
<input type="button" name="Button1" value="Orange" onclick="changecolor('orange')">
</form>
</BODY>
</HTML>
